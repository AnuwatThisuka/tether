services:
  postgres:
    image: postgres:16
    container_name: tether-pg
    ports:
      - "54321:5432"
    environment:
      POSTGRES_USER: tether
      POSTGRES_PASSWORD: tether
      POSTGRES_DB: tether
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=64
      - -c
      - max_wal_senders=64
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tether -d tether"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
